{% extends "base.html" %}
{% block title %}Car Booking{% endblock %}

{% block content %}
<h1>Book {{ car.brand }} {{ car.model }}</h1>

<hr>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

        Submit Booking

    </button>

</form>

<br>

<a href="{% url 'car_detail' car.id %}">

Back

</a>

{% endblock %}
