{% extends "base.html" %}

{% block title %}
Showroom
{% endblock %}

{% block content %}

<h2 class="mb-4">Luxury Car Showroom</h2>

<div class="row">

{% for car in cars %}

<div class="col-md-4 mb-4">

<div class="card h-100">

<img src="{{ car.image.url }}"
     class="card-img-top"
     style="height:250px;object-fit:cover;">

<div class="card-body">

<h5 class="card-title">

{{ car.brand }} {{ car.model }}

</h5>

<p>

₹{{ car.price }}

</p>

<a href="{% url 'car_detail' car.id %}"

class="btn btn-primary">

View Details

</a>

</div>

</div>

</div>

{% empty %}

<h3>No Cars Available</h3>

{% endfor %}

</div>

{% endblock %}
